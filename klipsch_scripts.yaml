klipsch_dirac:
    alias: 'Toggle Dirac Klipsch Flexus'
    mode: single
    icon: mdi:surround-sound
    sequence:
        - action: shell_command.klipsch_check_dirac
          response_variable: isdirac1
        - action: shell_command.klipsch_check_diracslots
          response_variable: isdiracslots1
        - variables:
            isdirac: '"{{ isdirac1 }}"'
            isdiracslots: '"{{ isdiracslots1 }}"'
        - choose:
            - conditions: "{{ ':-1' in isdirac and ':1,' in isdiracslots }}"
              sequence:
                action: shell_command.klipsch_diracoff
            - conditions: "{{ ':-1' in isdirac and (':2,' in isdiracslots or ':3,' in isdiracslots or ':4,' in isdiracslots or ':5,' in isdiracslots or ':6,' in isdiracslots or ':7,' in isdiracslots or ':8,' in isdiracslots or ':9,' in isdiracslots or ':10,' in isdiracslots or ':11,' in isdiracslots) }}"
              sequence:
                action: shell_command.klipsch_dirac1
            - conditions: "{{ ':0' in isdirac and ':2,' in isdiracslots }}"
              sequence:
                action: shell_command.klipsch_diracoff
            - conditions: "{{ ':0' in isdirac and (':3,' in isdiracslots or ':4,' in isdiracslots or ':5,' in isdiracslots or ':6,' in isdiracslots or ':7,' in isdiracslots or ':8,' in isdiracslots or ':9,' in isdiracslots or ':10,' in isdiracslots or ':11,' in isdiracslots) }}"
              sequence:
                action: shell_command.klipsch_dirac2
            - conditions: "{{ ':1' in isdirac and ':3,' in isdiracslots }}"
              sequence:
                action: shell_command.klipsch_diracoff
            - conditions: "{{ ':1' in isdirac and (':4,' in isdiracslots or ':5,' in isdiracslots or ':6,' in isdiracslots or ':7,' in isdiracslots or ':8,' in isdiracslots or ':9,' in isdiracslots or ':10,' in isdiracslots or ':11,' in isdiracslots) }}"
              sequence:
                action: shell_command.klipsch_dirac3
            - conditions: "{{ ':2' in isdirac and ':4,' in isdiracslots }}"
              sequence:
                action: shell_command.klipsch_diracoff
            - conditions: "{{ ':2' in isdirac and (':5,' in isdiracslots or ':6,' in isdiracslots or ':7,' in isdiracslots or ':8,' in isdiracslots or ':9,' in isdiracslots or ':10,' in isdiracslots or ':11,' in isdiracslots) }}"
              sequence:
                action: shell_command.klipsch_dirac4
            - conditions: "{{ ':3' in isdirac and ':5,' in isdiracslots }}"
              sequence:
                action: shell_command.klipsch_diracoff
            - conditions: "{{ ':3' in isdirac and (':6,' in isdiracslots or ':7,' in isdiracslots or ':8,' in isdiracslots or ':9,' in isdiracslots or ':10,' in isdiracslots or ':11,' in isdiracslots) }}"
              sequence:
                action: shell_command.klipsch_dirac5
            - conditions: "{{ ':4' in isdirac and ':6,' in isdiracslots }}"
              sequence:
                action: shell_command.klipsch_diracoff
            - conditions: "{{ ':4' in isdirac and (':7,' in isdiracslots or ':8,' in isdiracslots or ':9,' in isdiracslots or ':10,' in isdiracslots or ':11,' in isdiracslots) }}"
              sequence:
                action: shell_command.klipsch_dirac6
            - conditions: "{{ ':5' in isdirac and ':7,' in isdiracslots }}"
              sequence:
                action: shell_command.klipsch_diracoff
            - conditions: "{{ ':5' in isdirac and (':8,' in isdiracslots or ':9,' in isdiracslots or ':10,' in isdiracslots or ':11,' in isdiracslots) }}"
              sequence:
                action: shell_command.klipsch_dirac7
            - conditions: "{{ ':6' in isdirac and ':8,' in isdiracslots }}"
              sequence:
                action: shell_command.klipsch_diracoff
            - conditions: "{{ ':6' in isdirac and (':9,' in isdiracslots or ':10,' in isdiracslots or ':11,' in isdiracslots) }}"
              sequence:
                action: shell_command.klipsch_dirac8
            - conditions: "{{ ':7' in isdirac and ':9,' in isdiracslots }}"
              sequence:
                action: shell_command.klipsch_diracoff
            - conditions: "{{ ':7' in isdirac and (':10,' in isdiracslots or ':11,' in isdiracslots) }}"
              sequence:
                action: shell_command.klipsch_dirac9
            - conditions: "{{ ':8' in isdirac and ':10,' in isdiracslots }}"
              sequence:
                action: shell_command.klipsch_diracoff
            - conditions: "{{ ':8' in isdirac and ':11,' in isdiracslots }}"
              sequence:
                action: shell_command.klipsch_dirac10
          default:
            sequence:
                action: shell_command.klipsch_diracoff

