klipsch_mute:
    alias: 'Mute Klipsch Flexus'
    mode: single
    icon: mdi:volume-mute
    sequence:
        - action: shell_command.klipsch_check_mute
          response_variable: ismuted1
        - variables:
            ismuted: '"{{ ismuted1 }}"'
        - choose:
            - conditions: "{{ 'true' in ismuted }}"
              sequence:
                action: shell_command.klipsch_muteoff
          default:
            sequence:
                action: shell_command.klipsch_muteon
                
klipsch_nightmode:
    alias: 'Toggle Night Mode Klipsch Flexus'
    mode: single
    icon: mdi:weather-night
    sequence:
        - action: shell_command.klipsch_check_night
          response_variable: isnight1
        - variables:
            isnight: '"{{ isnight1 }}"'
        - choose:
            - conditions: "{{ 'nightMode_1' in isnight }}"
              sequence:
                action: shell_command.klipsch_nightoff
          default:
            sequence:
              action: shell_command.klipsch_nighton
              
klipsch_dialogmode:
    alias: 'Toggle Dialog Mode Klipsch Flexus'
    mode: single
    icon: mdi:forum-outline
    sequence:
        - action: shell_command.klipsch_check_dialog
          response_variable: isdialog1
        - variables:
            isdialog: '"{{ isdialog1 }}"'
        - choose:
            - conditions: "{{ 'off' in isdialog }}"
              sequence:
                action: shell_command.klipsch_dialoglow
            - conditions: "{{ 'dialog_1' in isdialog }}"
              sequence:
                action: shell_command.klipsch_dialogmedium
            - conditions: "{{ 'dialog_2' in isdialog }}"
              sequence:
                action: shell_command.klipsch_dialoghigh
          default:
            sequence:
                action: shell_command.klipsch_dialogoff

klipsch_power:
    alias: 'Toggle Power Klipsch Flexus'
    mode: single
    icon: mdi:power
    sequence:
        - action: shell_command.klipsch_check_power
          response_variable: ispower1
        - variables:
            ispower: '"{{ ispower1 }}"'
        - choose:
            - conditions: "{{ 'networkStandby' in ispower }}"
              sequence:
                action: shell_command.klipsch_on
          default:
            sequence:
                action: shell_command.klipsch_off

klipsch_soundmode:
    alias: 'Toggle Sound Mode Klipsch Flexus'
    mode: single
    icon: mdi:multimedia
    sequence:
        - action: shell_command.klipsch_check_mode
          response_variable: ismode1
        - variables:
            ismode: '"{{ ismode1 }}"'
        - choose:
            - conditions: "{{ 'music' in ismode }}"
              sequence:
                action: shell_command.klipsch_movie
          default:
            sequence:
                action: shell_command.klipsch_music

klipsch_led:
    alias: 'Toggle LED Brightness Klipsch Flexus'
    mode: single
    icon: mdi:brightness-5
    sequence:
        - action: shell_command.klipsch_check_led
          response_variable: isled1
        - variables:
            isled: '"{{ isled1 }}"'
        - choose:
            - conditions: "{{ 'normal' in isled }}"
              sequence:
                action: shell_command.klipsch_leddim
          default:
            sequence:
                action: shell_command.klipsch_lednormal

